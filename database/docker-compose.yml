version: '3.8'

services:
  db:
    image: postgres:16
    container_name: acode_aqui_db
    restart: always
    environment:
      POSTGRES_DB: acode_aqui
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./acode_aqui_schema.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    container_name: acode_aqui_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@acode.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata: